name: Generate README.md from readme.txt
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'readme.txt'

jobs:
  convert-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Convert readme.txt to README.md
        run: |
          npm install wp-readme-to-markdown
          node -e "
            const fs = require('fs');
            const mod = require('wp-readme-to-markdown');
            const fn = mod.wp_readme_to_markdown || mod.convert || mod.default || (typeof mod === 'function' ? mod : null);
            if (!fn) { console.error('Exports:', Object.keys(mod)); throw new Error('No convert function found'); }
            const input = fs.readFileSync('readme.txt', 'utf8');
            fs.writeFileSync('README.md', fn(input));
            console.log('README.md created successfully');
          "

      - name: Commit and push README.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Auto-generate README.md from readme.txt"
          file_pattern: 'README.md'