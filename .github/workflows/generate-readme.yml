name: Generate README.md from readme.txt

on:
  push:
    branches:
      - main
    paths:
      - 'readme.txt'

jobs:
  convert-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Convert to README.md
        uses: varunsridharan/wp2github-md@master

      - name: Commit and push README.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Auto-generate README.md from readme.txt"
          file_pattern: 'README.md'