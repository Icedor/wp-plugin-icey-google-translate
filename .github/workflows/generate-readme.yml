name: Generate README.md from readme.txt

on:
  push:
    branches:
      - main
    paths:
      - 'readme.txt'

jobs:
  convert-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Convert readme.txt to README.md
        run: |
          curl -sL https://github.com/wpreadme2markdown/wp2md/releases/latest/download/wp2md.phar -o wp2md.phar
          php wp2md.phar -i readme.txt -o README.md
          rm wp2md.phar

      - name: Commit and push README.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Auto-generate README.md from readme.txt"
          file_pattern: 'README.md'