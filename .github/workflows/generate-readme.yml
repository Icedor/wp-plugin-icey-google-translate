name: Generate README.md from readme.txt
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'readme.txt'

jobs:
  convert-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Convert readme.txt to README.md
        run: |
          npm install wp-readme-to-markdown
          node -e "
            const fs = require('fs');
            const mod = require('wp-readme-to-markdown');
            console.log('typeof mod:', typeof mod);
            console.log('mod:', mod);
            console.log('keys:', Object.keys(mod));
            console.log('proto keys:', Object.getOwnPropertyNames(mod));
          "

      - name: Commit and push README.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Auto-generate README.md from readme.txt"
          file_pattern: 'README.md'